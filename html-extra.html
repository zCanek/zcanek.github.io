<link
    href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&amp;family=UnifrakturMaguntia&amp;display=swap"
    rel="stylesheet">

<script>
document.addEventListener("DOMContentLoaded", () => {
  const isIndex = window.location.pathname === "/"
               || window.location.pathname.endsWith("index.html")
               || window.location.pathname.endsWith("Home.html");

  if (!isIndex) return;

  function tryExpand(attempts = 0) {
    if (attempts > 30) return;
    const gv = window.ObsidianSite?.graphView;
    if (!gv) return setTimeout(() => tryExpand(attempts + 1), 300);

    // Mostrar grafo global y expandirlo a pantalla completa
    gv.showGraph().then(() => {
      if (!gv.graphExpanded) gv.toggleExpandedGraph();
      setTimeout(() => gv.fitToNodes(), 500);
    });
  }

  tryExpand();
});
</script>

<script>
    function insertBar() {
        const bar = document.createElement('div');
        bar.className = 'top-bar';
        bar.textContent = "Canek's Blog";

        const target = document.getElementById('center-content');
        if (target) {
            // Inserta después del target (compatible con navegadores modernos)
            if (typeof target.prepend === 'function') {
                target.prepend(bar);
            } else {
                target.parentNode.insertBefore(bar, target.firstChild);
            }
            console.info('✅ Barra insertada');
        } else {
            console.warn('⚠️ #center-content no encontrado → barra al inicio del body');
            document.body.prepend(bar);
        }
    }

    // 1️⃣  Intentamos inmediatamente cuando el DOM está listo
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => insertBar());
    } else {
        insertBar();
    }

</script>

<style>
    .top-bar {
        font-size: 62px;
        width: 100%;

</style>
