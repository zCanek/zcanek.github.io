<script>
(function() {
  // Solo ejecutar en la página principal
  const path = window.location.pathname;
  const isIndex = path === "/" 
               || path.endsWith("/index.html") 
               || path.endsWith("/Home.html");

  if (!isIndex) return;

  function tryExpandGraph(attempts) {
    if (attempts > 40) return; // máximo ~8 segundos de espera

    var gv = window.ObsidianSite && window.ObsidianSite.graphView;

    if (!gv) {
      setTimeout(function() { tryExpandGraph(attempts + 1); }, 200);
      return;
    }

    // 1. Mostrar el grafo global (sin argumento = todas las notas)
    var result = gv.showGraph();
    var afterShow = function() {
      // 2. Expandir a pantalla completa si no está expandido
      if (!gv.graphExpanded) {
        gv.toggleExpandedGraph();
      }
      // 3. Ajustar zoom para ver todos los nodos
      setTimeout(function() {
        if (gv.fitToNodes) gv.fitToNodes();
      }, 600);
    };

    // showGraph puede devolver una Promise o no
    if (result && typeof result.then === "function") {
      result.then(afterShow);
    } else {
      setTimeout(afterShow, 300);
    }
  }

  // Esperar a que el DOM esté listo
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function() {
      tryExpandGraph(0);
    });
  } else {
    tryExpandGraph(0);
  }
})();
</script>
